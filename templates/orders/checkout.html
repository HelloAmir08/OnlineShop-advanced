{% extends "base.html" %}
{% block title %}Checkout - Online Shop{% endblock %}

{% block hero %}
<header class="hero hero-sm">
  <div class="container text-center">
    <h1 class="hero-title hero-title-sm">Checkout</h1>
    <p class="hero-subtitle">Complete your order</p>
  </div>
</header>
{% endblock %}

{% block content %}
<div class="row g-4 align-items-start">

  <!-- Checkout form -->
  <div class="col-12 col-lg-7">
    <div class="card soft-card">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-3">Shipping details</h4>

        <form method="get" action="#" novalidate>
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label">First name</label>
              <input
                type="text"
                name="first_name"
                class="form-control"
                placeholder="John"
              >
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Last name</label>
              <input
                type="text"
                name="last_name"
                class="form-control"
                placeholder="Doe"
              >
            </div>

            <div class="col-12">
              <label class="form-label">Phone number</label>
              <input
                type="text"
                name="phone_number"
                class="form-control"
                placeholder="+998 (__) ___-__-__"
              >
            </div>

            <div class="col-12">
              <label class="form-label">Address</label>
              <textarea
                name="address"
                class="form-control"
                rows="4"
                placeholder="Enter your address"
              ></textarea>
            </div>

            <div class="col-12">
              <label class="form-label">Comment (optional)</label>
              <textarea
                name="comment"
                class="form-control"
                rows="4"
                placeholder="Additional information for delivery"
              ></textarea>
            </div>

            <div class="col-12 d-grid mt-2">
              <button type="submit" class="btn btn-dark btn-pill">
                <i class="bi bi-check2-circle me-2"></i>Confirm order
              </button>
            </div>

          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Order summary -->
  <div class="col-12 col-lg-5">
    <div class="card soft-card cart-summary-card">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-3">Order summary</h4>

        <div class="d-flex justify-content-between align-items-start mb-3">
          <div class="pe-3">
            <div class="fw-semibold">Classic Hoodie</div>
            <div class="text-muted small">Qty: 1</div>
          </div>
          <div class="fw-bold">$60.00</div>
        </div>

        <div class="d-flex justify-content-between align-items-start mb-3">
          <div class="pe-3">
            <div class="fw-semibold">City Backpack</div>
            <div class="text-muted small">Qty: 2</div>
          </div>
          <div class="fw-bold">$162.00</div>
        </div>

        <div class="divider my-3"></div>

        <div class="d-flex justify-content-between">
          <span class="text-muted">Total</span>
          <span class="fw-bold fs-5">$222.00</span>
        </div>
      </div>
    </div>
  </div>

</div>
{% endblock %}
